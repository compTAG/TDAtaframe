# .github/workflows/mac-debug.yml
name: Mac ARM Debug Session
on: workflow_dispatch

jobs:
  debug:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install tdataframe
        run: pip install tdataframe
      - name: Start SSH session
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 30
