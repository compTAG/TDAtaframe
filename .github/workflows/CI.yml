name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  LIBTORCH_USE_PYTORCH: "1"
  PYTORCH_CPU_INDEX_URL: https://download.pytorch.org/whl/cpu

jobs:
  wheel-test:
    name: Wheel install test (${{ matrix.label }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x64
            os: ubuntu-24.04
            python-version: "3.12"
          - label: linux-x64
            os: ubuntu-24.04
            python-version: "3.13"
          - label: macos-x64
            os: macos-13
            python-version: "3.12"
          - label: macos-arm64
            os: macos-14
            python-version: "3.12"
          - label: windows-x64
            os: windows-2022
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo downloads and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-${{ runner.arch }}-py${{ matrix.python-version }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-py${{ matrix.python-version }}-cargo-

      - name: Show toolchains
        run: |
          python --version
          rustc --version
          cargo --version

      - name: Build wheel, install it into a clean venv, and run tests
        run: >
          python scripts/wheel_install_test.py
          --dist dist
          --preinstall-build-deps
          --torch-index-url "${{ env.PYTORCH_CPU_INDEX_URL }}"

      - name: Upload tested wheel
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.label }}
          path: dist/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          rust-toolchain: nightly
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - wheel-test
      - sdist
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
